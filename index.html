<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Arca AR Demo</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A1120; overflow: hidden; font-family: 'Space Mono', monospace; }

  /* --- ローディング画面 --- */
  #loading-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #0A1120;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    transition: opacity 0.8s ease;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }

  .arca-logo-text {
    font-size: 48px; font-weight: 700; letter-spacing: 0.05em;
    color: #ffffff;
  }
  .arca-logo-text span { color: #02C39A; }
  .arca-logo-yb {
    position: relative;
    top: -20px; left: 4px;
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, #14B8A6, #0D9488);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .loading-bar-wrap {
    width: 200px; height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
  }
  .loading-bar {
    height: 100%; width: 0%; background: #02C39A;
    border-radius: 2px;
    animation: loadbar 2.5s ease forwards;
  }
  @keyframes loadbar { to { width: 100%; } }

  .loading-hint {
    font-size: 12px; color: rgba(255,255,255,0.4);
    letter-spacing: 0.12em; text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* --- ステータスバー --- */
  #status-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(10,17,32,0.95), transparent);
    pointer-events: none;
  }
  .status-logo { font-size: 18px; font-weight: 700; color: #fff; }
  .status-logo span { color: #02C39A; }
  .status-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #02C39A;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* --- マーカー未検出ガイド --- */
  #guide-overlay {
    position: fixed; inset: 0; z-index: 500;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #guide-overlay.hidden { opacity: 0; }

  .finder-frame {
    width: 220px; height: 220px;
    position: relative;
  }
  .finder-frame::before,
  .finder-frame::after,
  .finder-corner-br,
  .finder-corner-bl {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    border-color: #02C39A;
    border-style: solid;
  }
  .finder-frame::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .finder-frame::after  { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .finder-corner-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
  .finder-corner-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }

  .scan-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: linear-gradient(to right, transparent, #02C39A, transparent);
    top: 0;
    animation: scan 2.5s ease-in-out infinite;
  }
  @keyframes scan { 0%{top:0} 50%{top:100%} 100%{top:0} }

  .guide-text {
    margin-top: 24px;
    font-size: 12px; color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em; text-transform: uppercase;
    text-align: center;
  }

  /* --- マーカー検出後カード --- */
  #info-card {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    z-index: 900; width: 300px;
    background: rgba(10,17,32,0.92);
    border: 1px solid rgba(2,195,154,0.3);
    border-radius: 16px; padding: 20px 24px;
    backdrop-filter: blur(16px);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: none;
  }
  #info-card.visible {
    transform: translateX(-50%) translateY(0);
    display: block;
  }

  .card-name { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .card-title { font-size: 11px; color: #02C39A; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }
  .card-divider { height: 1px; background: rgba(255,255,255,0.08); margin-bottom: 14px; }

  .card-link {
    display: flex; align-items: center; gap: 10px;
    color: rgba(255,255,255,0.6); text-decoration: none;
    font-size: 13px; padding: 6px 0;
    transition: color 0.2s;
  }
  .card-link:hover { color: #02C39A; }
  .card-link-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: rgba(2,195,154,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }

  .card-tagline {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; color: rgba(255,255,255,0.3);
    letter-spacing: 0.08em;
  }
  .card-tagline strong { color: #14B8A6; }

  /* --- パーティクルキャンバス（2D） --- */
  #particle-canvas {
    position: fixed; inset: 0; z-index: 100;
    pointer-events: none;
    opacity: 0; transition: opacity 1s ease;
  }
  #particle-canvas.active { opacity: 1; }

  /* AR シーン */
  a-scene { position: fixed !important; inset: 0; z-index: 200; }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ローディング -->
<div id="loading-screen">
  <div>
    <span class="arca-logo-text">Arc<span>a</span></span><sup class="arca-logo-yb">yb</sup>
  </div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-hint">カメラを起動中</div>
</div>

<!-- ステータスバー -->
<div id="status-bar">
  <div class="status-logo">Arc<span>a</span></div>
  <div class="status-indicator">
    <div class="status-dot"></div>
    AR READY
  </div>
</div>

<!-- スキャンガイド -->
<div id="guide-overlay">
  <div class="finder-frame">
    <div class="scan-line"></div>
    <div class="finder-corner-br"></div>
    <div class="finder-corner-bl"></div>
  </div>
  <div class="guide-text">Hiroマーカーをかざしてください</div>
</div>

<!-- パーティクルキャンバス（2Dエフェクト） -->
<canvas id="particle-canvas"></canvas>

<!-- 名刺情報カード -->
<div id="info-card">
  <div class="card-name">［氏名］</div>
  <div class="card-title">Arca &nbsp;|&nbsp; 代表</div>
  <div class="card-divider"></div>
  <a href="https://arcayb.com" class="card-link">
    <div class="card-link-icon">🌐</div>arcayb.com
  </a>
  <a href="mailto:info@arcayb.com" class="card-link">
    <div class="card-link-icon">✉️</div>info@arcayb.com
  </a>
  <a href="tel:09000000000" class="card-link">
    <div class="card-link-icon">📞</div>090-0000-0000
  </a>
  <div class="card-tagline"><strong>Your Bridge.</strong> — AI × Google Workspace で現場を繋ぐ</div>
</div>

<!-- AR シーン -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
>

  <a-marker preset="hiro" id="marker">

    <!-- ベース：浮遊プラットフォーム -->
    <a-cylinder
      position="0 0.01 0"
      radius="1.6" height="0.04"
      color="#02C39A"
      opacity="0.15"
      animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 20000; loop: true; easing: linear">
    </a-cylinder>

    <!-- 外リング -->
    <a-torus
      position="0 0.05 0"
      rotation="-90 0 0"
      radius="1.55" radius-tubular="0.018"
      color="#02C39A" opacity="0.5"
      animation="property: rotation; from: -90 0 0; to: -90 360 0; dur: 8000; loop: true; easing: linear">
    </a-torus>

    <!-- 内リング（逆回転） -->
    <a-torus
      position="0 0.1 0"
      rotation="-90 0 0"
      radius="1.1" radius-tubular="0.012"
      color="#14B8A6" opacity="0.4"
      animation="property: rotation; from: -90 0 0; to: -90 -360 0; dur: 5000; loop: true; easing: linear">
    </a-torus>

    <!-- ロゴテキスト "Arc" -->
    <a-text
      value="Arc"
      color="#ffffff"
      width="5"
      position="-0.4 1.2 0"
      rotation="-90 0 0"
      align="center"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
    </a-text>

    <!-- ロゴテキスト "a"（アクセントカラー） -->
    <a-text
      value="a"
      color="#02C39A"
      width="5"
      position="1.05 1.2 0"
      rotation="-90 0 0"
      align="center"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
    </a-text>

    <!-- サブテキスト "yb" -->
    <a-text
      value="yb"
      color="#14B8A6"
      width="2"
      position="1.62 1.38 0"
      rotation="-90 0 0"
      align="left"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
    </a-text>

    <!-- タグライン -->
    <a-text
      value="Your Bridge."
      color="#0D9488"
      width="3.5"
      position="0 0.55 0"
      rotation="-90 0 0"
      align="center">
    </a-text>

    <!-- 浮遊ドット x3 -->
    <a-sphere position="-1.2 0.3 0.3" radius="0.07" color="#02C39A"
      animation="property: position; from: -1.2 0.3 0.3; to: -1.2 0.7 0.3; dur: 2200; loop: true; dir: alternate; easing: easeInOutSine">
    </a-sphere>

    <a-sphere position="1.2 0.4 -0.4" radius="0.07" color="#14B8A6"
      animation="property: position; from: 1.2 0.4 -0.4; to: 1.2 0.8 -0.4; dur: 1800; loop: true; dir: alternate; easing: easeInOutSine">
    </a-sphere>

    <a-sphere position="0.2 0.5 -1.3" radius="0.05" color="#0D9488"
      animation="property: position; from: 0.2 0.5 -1.3; to: 0.2 0.9 -1.3; dur: 2600; loop: true; dir: alternate; easing: easeInOutSine">
    </a-sphere>

    <!-- ロゴ全体のフロートアニメーション用グループ -->
    <a-entity
      position="0 0 0"
      animation="property: position; from: 0 0 0; to: 0 0.25 0; dur: 3000; loop: true; dir: alternate; easing: easeInOutSine">
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
/* --- ローディング解除 --- */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading-screen').classList.add('hidden');
  }, 2800);
});

/* --- マーカー検出イベント --- */
const marker    = document.getElementById('marker');
const guide     = document.getElementById('guide-overlay');
const infoCard  = document.getElementById('info-card');
const pCanvas   = document.getElementById('particle-canvas');

marker.addEventListener('markerFound', () => {
  guide.classList.add('hidden');
  infoCard.style.display = 'block';
  setTimeout(() => infoCard.classList.add('visible'), 10);
  pCanvas.classList.add('active');
  startParticles();
});

marker.addEventListener('markerLost', () => {
  guide.classList.remove('hidden');
  infoCard.classList.remove('visible');
  setTimeout(() => { infoCard.style.display = 'none'; }, 500);
  pCanvas.classList.remove('active');
  stopParticles();
});

/* --- 2D パーティクルエフェクト --- */
const ctx = pCanvas.getContext('2d');
let particles = [], animId = null, running = false;

function resizeCanvas() {
  pCanvas.width  = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x  = Math.random() * pCanvas.width;
    this.y  = pCanvas.height + 10;
    this.vx = (Math.random() - 0.5) * 0.6;
    this.vy = -(Math.random() * 1.2 + 0.4);
    this.r  = Math.random() * 2.5 + 0.5;
    this.alpha = Math.random() * 0.6 + 0.2;
    const colors = ['#02C39A','#14B8A6','#0D9488','#5DCAA5'];
    this.color = colors[Math.floor(Math.random() * colors.length)];
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.alpha -= 0.003;
    if (this.y < -10 || this.alpha <= 0) this.reset();
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function startParticles() {
  if (running) return;
  running = true;
  for (let i = 0; i < 60; i++) particles.push(new Particle());
  loop();
}
function stopParticles() {
  running = false;
  if (animId) cancelAnimationFrame(animId);
  ctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles = [];
}
function loop() {
  if (!running) return;
  ctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  animId = requestAnimationFrame(loop);
}
</script>
</body>
</html>
